<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Petros Methodology">
  <title>Petros Methodology</title>
  <desc>Zero AI slop. Output that reads like a human wrote it.</desc>
  <rect width="1200" height="360" fill="#0A0A0B"/>
  <g stroke="#FFFFFF" stroke-opacity="0.05">
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="600" y1="0" x2="600" y2="360"/>
    <line x1="900" y1="0" x2="900" y2="360"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>
  <rect x="0.5" y="0.5" width="1199" height="359" stroke="#FFFFFF" stroke-opacity="0.10"/>

  <!-- "no slop" mark: a dash inside a circle, crossed out -->
  <g transform="translate(996,116)">
    <circle r="74" fill="none" stroke="#27272A" stroke-width="2"/>
    <rect x="-40" y="-7" width="80" height="14" rx="7" fill="#3F3F46"/>
    <line x1="-58" y1="58" x2="58" y2="-58" stroke="#E11D48" stroke-width="12" stroke-linecap="round"/>
  </g>
  <text x="996" y="232" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#71717A" letter-spacing="2">NO MDASH</text>

  <text x="80" y="138" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Arial, sans-serif" font-size="74" font-weight="700" fill="#FAFAFA" letter-spacing="-1">Petros Methodology</text>
  <rect x="82" y="158" width="120" height="5" rx="2.5" fill="#E11D48"/>

  <text x="84" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Arial, sans-serif" font-size="27" font-weight="500" fill="#D4D4D8">Zero AI slop. Output, który wygląda jak pisany przez człowieka.</text>
  <text x="84" y="246" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Arial, sans-serif" font-size="20" font-weight="400" fill="#71717A">Ship fast, verify, no wasted space. A taste-and-workflow skill for Claude.</text>

  <!-- rule chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#A1A1AA">
    <g transform="translate(84,292)">
      <rect width="150" height="34" rx="17" fill="none" stroke="#27272A"/>
      <text x="75" y="22" text-anchor="middle">po polsku</text>
    </g>
    <g transform="translate(246,292)">
      <rect width="138" height="34" rx="17" fill="none" stroke="#27272A"/>
      <text x="69" y="22" text-anchor="middle">gęsty UI</text>
    </g>
    <g transform="translate(396,292)">
      <rect width="160" height="34" rx="17" fill="none" stroke="#27272A"/>
      <text x="80" y="22" text-anchor="middle">zero fejków</text>
    </g>
    <g transform="translate(568,292)">
      <rect width="186" height="34" rx="17" fill="none" stroke="#27272A"/>
      <text x="93" y="22" text-anchor="middle">weryfikuj efekt</text>
    </g>
    <g transform="translate(766,292)">
      <rect width="196" height="34" rx="17" fill="none" stroke="#27272A"/>
      <text x="98" y="22" text-anchor="middle">rób autonomicznie</text>
    </g>
  </g>
</svg>
